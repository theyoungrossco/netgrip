name: Release

# Push a tag like v0.3.0 to build and publish installers. Manual runs
# (workflow_dispatch) build the artifacts without publishing a release — handy
# for checking the pipeline before tagging.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Gate the release on the same fast, headless checks CI runs (no Qt needed).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest ruff
      - run: ruff check src tests
      - run: pytest -q

  linux-dist:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: dist/*

  windows-installer:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer (PyInstaller + Inno Setup)
        run: powershell -ExecutionPolicy Bypass -File scripts\build-windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/NetGrip-*-setup.exe

  release:
    # Only publish for real tag pushes; dispatch runs stop after building.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux-dist, windows-installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: find artifacts -type f
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 0.x is alpha — flag the release as a pre-release.
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/linux-dist/*.whl
            artifacts/linux-dist/*.tar.gz
            artifacts/windows-installer/NetGrip-*-setup.exe
