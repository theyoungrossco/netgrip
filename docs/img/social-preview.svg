<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <!-- GitHub social preview: flat squares + straight lines, like the app canvas itself. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#283643"/>
      <stop offset="1" stop-color="#1c2832"/>
    </linearGradient>
    <style>
      text { font-family: 'DejaVu Sans', 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- faint canvas frame, like the app's scene border -->
  <rect x="40" y="40" width="1200" height="560" rx="18" fill="none" stroke="#3a4b5c" stroke-width="2"/>

  <!-- ================= left: wordmark ================= -->
  <g transform="translate(96,212)">
    <!-- logo glyph: N monogram, matching data/icons/io.github.theyoungrossco.netgrip.svg -->
    <g transform="scale(0.275)">
      <rect width="400" height="400" rx="88" fill="#1e2228" stroke="#46596b" stroke-width="5"/>
      <polyline points="120,290 120,110 280,290 280,110" fill="none" stroke="#828b94"
                stroke-width="22" stroke-linejoin="round" stroke-linecap="round"/>
      <rect x="89" y="79" width="62" height="62" rx="17.36" fill="#26313d" stroke="#5b8cb5" stroke-width="3"/>
      <rect x="249" y="79" width="62" height="62" rx="17.36" fill="#2a2440" stroke="#9b86cf" stroke-width="3"/>
      <rect x="89" y="259" width="62" height="62" rx="17.36" fill="#1f3020" stroke="#5fae5f" stroke-width="3"/>
      <rect x="249" y="259" width="62" height="62" rx="17.36" fill="#36301f" stroke="#c79a52" stroke-width="3"/>
      <circle cx="135.99" cy="92.97" r="6.96" fill="#46e06a"/>
      <circle cx="295.87" cy="273.31" r="6.96" fill="#46e06a"/>
    </g>
  </g>

  <g transform="translate(96,400)">
    <text x="0" y="0" font-size="92" font-weight="700" fill="#f1f5f9" letter-spacing="-1">NetGrip</text>
    <text x="4" y="58" font-size="28" font-weight="400" fill="#9fb0c0">Visual, drag-and-drop network</text>
    <text x="4" y="96" font-size="28" font-weight="400" fill="#9fb0c0">management for Linux.</text>
  </g>

  <!-- ================= right: topology vignette ================= -->
  <g transform="translate(620,70)" font-family="DejaVu Sans, sans-serif">
    <!-- connecting lines, centre-to-centre, drawn first so boxes sit on top -->
    <g stroke="#7f8b97" stroke-width="2.5" fill="none">
      <line x1="65"  y1="104" x2="265" y2="124"/>   <!-- eth1 -> bond0 -->
      <line x1="65"  y1="176" x2="265" y2="124"/>   <!-- eth2 -> bond0 -->
      <line x1="65"  y1="29"  x2="400" y2="33"/>    <!-- eth0 -> IPv4 -->
      <line x1="65"  y1="29"  x2="400" y2="110"/>   <!-- eth0 -> IPv6 -->
      <line x1="65"  y1="359" x2="265" y2="328"/>   <!-- eth3 -> vmbr0 -->
      <line x1="265" y1="328" x2="400" y2="324"/>   <!-- vmbr0 -> tap -->
      <line x1="265" y1="428" x2="400" y2="428"/>   <!-- docker0 -> container -->
    </g>
    <!-- tagged VLAN edge, dashed like the app -->
    <g stroke="#4fb3a6" stroke-width="2.5" fill="none" stroke-dasharray="6 4">
      <line x1="265" y1="124" x2="400" y2="178"/>   <!-- bond0 -> VLAN 40 -->
    </g>

    <!-- ===== column A: physical interfaces (blue) ===== -->
    <g>
      <rect x="0" y="0" width="130" height="58" rx="6" fill="#27333f" stroke="#5b7da3" stroke-width="2.5"/>
      <circle cx="118" cy="13" r="4" fill="#46c46e"/>
      <text x="14" y="26" font-size="18" font-weight="700" fill="#dbe6f0">eth0</text>
      <text x="14" y="46" font-size="12" fill="#8ea0b2">uplink · mtu 1500</text>
    </g>
    <g>
      <rect x="0" y="78" width="130" height="52" rx="6" fill="#27333f" stroke="#5b7da3" stroke-width="2.5"/>
      <circle cx="118" cy="91" r="4" fill="#46c46e"/>
      <text x="14" y="103" font-size="18" font-weight="700" fill="#dbe6f0">eth1</text>
      <text x="14" y="121" font-size="12" fill="#8ea0b2">member bond0</text>
    </g>
    <g>
      <rect x="0" y="150" width="130" height="52" rx="6" fill="#27333f" stroke="#5b7da3" stroke-width="2.5"/>
      <circle cx="118" cy="163" r="4" fill="#46c46e"/>
      <text x="14" y="175" font-size="18" font-weight="700" fill="#dbe6f0">eth2</text>
      <text x="14" y="193" font-size="12" fill="#8ea0b2">member bond0</text>
    </g>
    <g>
      <rect x="0" y="250" width="130" height="52" rx="6" fill="#27333f" stroke="#5b7da3" stroke-width="2.5"/>
      <circle cx="118" cy="263" r="4" fill="#e06a5a"/>
      <text x="14" y="275" font-size="18" font-weight="700" fill="#dbe6f0">wlan0</text>
      <text x="14" y="293" font-size="12" fill="#8ea0b2">wifi · down</text>
    </g>
    <g>
      <rect x="0" y="330" width="130" height="58" rx="6" fill="#27333f" stroke="#5b7da3" stroke-width="2.5"/>
      <circle cx="118" cy="343" r="4" fill="#46c46e"/>
      <text x="14" y="356" font-size="18" font-weight="700" fill="#dbe6f0">eth3</text>
      <text x="14" y="376" font-size="12" fill="#8ea0b2">vmbr0 · tagged 20,30</text>
    </g>

    <!-- ===== column B: aggregation / bridges (gold) ===== -->
    <g>
      <rect x="200" y="96" width="130" height="56" rx="6" fill="#3a3322" stroke="#b08a3c" stroke-width="2.5"/>
      <circle cx="318" cy="109" r="4" fill="#46c46e"/>
      <text x="214" y="121" font-size="18" font-weight="700" fill="#e6cf9a">bond0</text>
      <text x="214" y="140" font-size="12" fill="#c2a86f">LACP · 802.3ad</text>
    </g>
    <g>
      <rect x="200" y="300" width="130" height="56" rx="6" fill="#3a3322" stroke="#b08a3c" stroke-width="2.5"/>
      <circle cx="318" cy="313" r="4" fill="#46c46e"/>
      <text x="214" y="325" font-size="18" font-weight="700" fill="#e6cf9a">vmbr0</text>
      <text x="214" y="344" font-size="12" fill="#c2a86f">bridge · vlan-aware</text>
    </g>
    <g>
      <rect x="200" y="400" width="130" height="56" rx="6" fill="#3a3322" stroke="#b08a3c" stroke-width="2.5"/>
      <circle cx="318" cy="413" r="4" fill="#46c46e"/>
      <text x="214" y="425" font-size="18" font-weight="700" fill="#e6cf9a">docker0</text>
      <text x="214" y="444" font-size="12" fill="#c2a86f">docker bridge</text>
    </g>

    <!-- ===== column C: virtual / addressing / containers ===== -->
    <!-- IPv4 group (green) -->
    <g>
      <rect x="400" y="0" width="165" height="66" rx="6" fill="#22332a" stroke="#3f8a44" stroke-width="2.5"/>
      <text x="414" y="24" font-size="18" font-weight="700" fill="#a9e2ad">IPv4</text>
      <text x="414" y="44" font-size="12" fill="#86b58a">192.168.1.10/24 (dhcp)</text>
      <text x="414" y="60" font-size="12" fill="#86b58a">gw 192.168.1.1</text>
    </g>
    <!-- IPv6 group (purple) -->
    <g>
      <rect x="400" y="84" width="165" height="52" rx="6" fill="#2c2839" stroke="#6d51a8" stroke-width="2.5"/>
      <text x="414" y="108" font-size="18" font-weight="700" fill="#c5b6e6">IPv6</text>
      <text x="414" y="127" font-size="12" fill="#a594c9">2001:db8:1::10/64</text>
    </g>
    <!-- VLAN on bond (teal) -->
    <g>
      <rect x="400" y="150" width="135" height="56" rx="6" fill="#1f3431" stroke="#4fb3a6" stroke-width="2.5"/>
      <circle cx="523" cy="163" r="4" fill="#46c46e"/>
      <text x="414" y="175" font-size="18" font-weight="700" fill="#a7e3da">VLAN 40</text>
      <text x="414" y="194" font-size="12" fill="#79bfb5">bond0.40</text>
    </g>
    <!-- VM tap on the vlan-aware bridge (blue) -->
    <g>
      <rect x="400" y="296" width="165" height="56" rx="6" fill="#27333f" stroke="#5b7da3" stroke-width="2.5"/>
      <circle cx="553" cy="309" r="4" fill="#46c46e"/>
      <text x="414" y="321" font-size="18" font-weight="700" fill="#dbe6f0">tap200i0</text>
      <text x="414" y="340" font-size="12" fill="#8ea0b2">VM tap · vlan 20</text>
    </g>
    <!-- Docker container (indigo) -->
    <g>
      <rect x="400" y="396" width="165" height="64" rx="6" fill="#272b41" stroke="#828ce0" stroke-width="2.5"/>
      <circle cx="553" cy="409" r="4" fill="#46c46e"/>
      <text x="414" y="421" font-size="18" font-weight="700" fill="#c4caf2">shop-web-1</text>
      <text x="414" y="440" font-size="12" fill="#9aa3df">nginx:1.27</text>
      <text x="414" y="455" font-size="12" fill="#9aa3df">172.18.0.2</text>
    </g>
  </g>

  <!-- footer: capability strip -->
  <text x="640" y="572" font-size="19" fill="#7e8f9f" text-anchor="middle">Docker · Proxmox · bonds · VLANs · bridges · IPv6 · local &amp; remote SSH</text>
</svg>
